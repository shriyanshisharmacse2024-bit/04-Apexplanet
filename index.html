<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>Hello! I am a Web Development Intern learning HTML, CSS and JavaScript.</p>
</section>

<section id="projects">
    <h2>Projects</h2>

    <div class="card">
        <h3>Task 1 Project</h3>
        <p>Basic Web Page using HTML, CSS & JS.</p>
    </div>

    <div class="card">
        <h3>Task 2 Project</h3>
        <p>Contact Form and To-Do List.</p>
    </div>

    <div class="card">
        <h3>Task 3 Project</h3>
        <p>Quiz App and API Integration.</p>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>

    <input type="text" id="name" placeholder="Your Name">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button onclick="sendMessage()">Send</button>

    <p id="result"></p>
</section>

<script src="script.js"></script>

</body>
</html>
